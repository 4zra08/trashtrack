<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrashTrack - Welcome Back</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-body">

    <div class="bg-dots top-right"></div>
    <div class="bg-dots bottom-left"></div>
    <div class="bg-leaf leaf-1"><i class="fa-solid fa-leaf"></i></div>
    <div class="bg-leaf leaf-2"><i class="fa-solid fa-leaf"></i></div>

    <div class="vector-truck">
        <i class="fa-solid fa-truck-moving"></i>
        <div class="truck-eco-symbol"><i class="fa-solid fa-recycle"></i></div>
    </div>

    <div class="vector-bin">
        <i class="fa-solid fa-trash-can"></i>
        <div class="bin-eco-symbol"><i class="fa-solid fa-recycle"></i></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-trash-can"></i></div>
                <span class="brand-name">Trash<span>Track</span></span>
            </div>
            
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to manage pickup requests and bins</p>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <i class="fa-regular fa-eye toggle-password" onclick="togglePasswordVisibility('loginPassword', this)"></i>
                    </div>
                </div>

                <div class="form-actions-row">
                    <div class="form-check">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Login
                </button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
