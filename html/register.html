<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrashTrack - Create Account</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-trash-can"></i></div>
                <span class="brand-name">Trash<span>Track</span></span>
            </div>
            
            <h2>Create Account</h2>
            <p class="auth-subtitle">Start tracking waste pickup requests</p>

            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user input-icon"></i>
                        <input type="text" id="regName" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="regEmail" placeholder="Enter your email address" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="regPassword" placeholder="Create a password" required>
                        <i class="fa-regular fa-eye toggle-password" onclick="togglePasswordVisibility('regPassword', this)"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                        <i class="fa-regular fa-eye toggle-password" onclick="togglePasswordVisibility('regConfirmPassword', this)"></i>
                    </div>
                </div>

                <div class="form-check">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-submit">Register</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div><br><br>
        </div>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
